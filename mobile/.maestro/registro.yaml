# registro.yaml — canje de código → registro 2 fases → onboarding → feed.
# Código del seed (local y remoto): DEMO2026 (Inmobiliaria GDL Premium).
# ⚠️ Re-corridas requieren limpiar el email e2e (local: `supabase db reset`;
#    remoto: borrar e2e.agente@urbea.demo de auth.users).
appId: com.urbea.app
name: "registro — invitación, alta y onboarding"
---
- runFlow: helpers/launch.yaml

# Entrada por el enlace del login — #20.13 lo hizo accesible ("Regístrate").
- tapOn: "Regístrate"
# El registro abre en modo libre (cuenta normal) — cambiar al flujo de agente.
- extendedWaitUntil:
    visible: "Regístrate como agente"
    timeout: 30000
- tapOn: "Regístrate como agente"
- extendedWaitUntil:
    visible: "Crea tu cuenta de agente"
    timeout: 30000

# Fase 1: canje del código → preview de la agencia
- tapOn:
    id: "register-code"
- inputText: "DEMO2026"
# hideKeyboard es flaky en esta pantalla — tap en texto estático cierra el teclado
- tapOn: "Crea tu cuenta de agente"
- tapOn: "Validar código"
- extendedWaitUntil:
    visible: "Inmobiliaria GDL Premium"
    timeout: 30000

# Fase 2: datos del agente
- tapOn:
    id: "register-first-name"
- inputText: "Emilia"
- tapOn:
    id: "register-last-name"
- inputText: "Prueba"
- tapOn:
    id: "register-email"
- inputText: "e2e.agente@urbea.demo"
- tapOn:
    id: "register-password"
- inputText: "urbea2026e2e"
- tapOn: "Crea tu cuenta de agente"
# El header con el lockup es alto; en la fase 2 (5 campos) el CTA queda bajo el
# fold → scroll hasta el botón antes de tocarlo (refleja el scroll del usuario real).
- scrollUntilVisible:
    element:
      text: "Crear cuenta"
    direction: DOWN
    timeout: 15000
- tapOn: "Crear cuenta"

# Auto-login → onboarding
- extendedWaitUntil:
    visible: "BIENVENIDO A URBEA"
    timeout: 60000
- tapOn: "Tu nombre y apellido"
- inputText: "Emilia Prueba"
- tapOn: "BIENVENIDO A URBEA"
- tapOn: "Continuar"

# Aterriza en el feed
- extendedWaitUntil:
    visible: "Guardados"
    timeout: 45000
