# botonera.yaml — smoke de navegación: cada tab y botón visible responde.
# Cuenta: agente1 (tiene tab CRM y 2 publicaciones).
appId: com.urbea.app
name: "botonera — smoke de navegación"
---
- runFlow:
    file: helpers/login.yaml
    env:
      EMAIL: "agente1.gdl@urbea.demo"

# Guardados vive en Perfil → menú ⋯ (agente1 sin saves → empty state)
- tapOn: "Perfil"
- tapOn: "Abrir menú de perfil"
- tapOn: "Guardados"
- extendedWaitUntil:
    visible: "Aún no tienes guardados"
    timeout: 20000
- back

# Mapa
- tapOn: "Mapa"
- extendedWaitUntil:
    visible: "Buscar zona o ciudad"
    timeout: 30000

# CRM (solo agentes)
- tapOn: "Leads"
- extendedWaitUntil:
    visible: "Tus leads de contacto"
    timeout: 20000

# Perfil
- tapOn: "Perfil"
- extendedWaitUntil:
    visible: "Editar perfil"
    timeout: 20000
- assertVisible: "Cerrar sesión"

# Mis publicaciones (agente1 = prop01 + prop02)
- tapOn: "Mis publicaciones"
- extendedWaitUntil:
    visible: "Todas (2)"
    timeout: 20000
- back

# Feed: sheet de filtros abre y cierra
- tapOn: "Feed"
- tapOn: "Abrir filtros"
- extendedWaitUntil:
    visible: "Filtros"
    timeout: 15000
- assertVisible: "Operación"
- tapOn: "Cerrar filtros"

# FAB → wizard de publicación abre
- tapOn: "Publicar propiedad"
- extendedWaitUntil:
    visible: "¿Qué vas a publicar?"
    timeout: 20000
- back
